<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Dark warm background -->
  <rect width="1200" height="630" fill="#2C231A"/>

  <!-- Subtle warm gradient overlay -->
  <rect width="1200" height="630" fill="url(#warmGrad)" opacity="0.3"/>
  <defs>
    <radialGradient id="warmGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2C231A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Decorative thin line -->
  <line x1="400" y1="180" x2="800" y2="180" stroke="#D4A574" stroke-width="0.5" opacity="0.5"/>

  <!-- The Human -->
  <text x="600" y="300" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="90" font-style="italic" font-weight="300" fill="#FAF7F2" letter-spacing="2">The Human</text>

  <!-- Movement. in accent -->
  <text x="600" y="400" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="90" font-style="italic" font-weight="300" fill="#D4A574" letter-spacing="2">Movement.</text>

  <!-- Decorative thin line -->
  <line x1="400" y1="440" x2="800" y2="440" stroke="#D4A574" stroke-width="0.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#FAF7F2" opacity="0.5" letter-spacing="6">HUMAN.MOV</text>
</svg>
